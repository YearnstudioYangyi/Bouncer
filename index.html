<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncer · Config Editor</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #9aa3b2;
    --accent: #5b8cff;
    --accent-soft: #2a3a66;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --radius: 10px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  header.topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px;
    background: rgba(15,17,21,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .logo { font-weight: 700; font-size: 16px; letter-spacing: .3px; display:flex; align-items:center; gap:8px;}
  .logo .dot { width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .ver { color: var(--muted); font-size: 12px; font-weight: 500; }
  .spacer { flex: 1; }
  .layout { display: grid; grid-template-columns: 220px 1fr 420px; min-height: calc(100vh - 53px); }
  nav.side {
    border-right: 1px solid var(--border);
    padding: 14px 10px;
    position: sticky; top: 53px; align-self: start;
    height: calc(100vh - 53px); overflow-y: auto;
  }
  nav.side a {
    display: flex; align-items:center; justify-content: space-between;
    padding: 8px 12px; margin-bottom: 2px;
    border-radius: 8px; color: var(--muted);
    text-decoration: none; cursor: pointer; font-weight: 500;
    transition: background .12s, color .12s;
  }
  nav.side a:hover { background: var(--panel); color: var(--text); }
  nav.side a.active { background: var(--accent-soft); color: #fff; }
  nav.side a .badge {
    font-size: 11px; background: var(--panel-2); color: var(--muted);
    padding: 1px 7px; border-radius: 20px; min-width: 20px; text-align:center;
  }
  nav.side a.active .badge { background: var(--accent); color:#fff; }
  main.content { padding: 22px 26px; overflow-y: auto; }
  aside.preview {
    border-left: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 53px; align-self: start;
    height: calc(100vh - 53px);
    display: flex; flex-direction: column;
  }
  aside.preview .ph {
    display:flex; align-items:center; gap:8px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  aside.preview .ph h3 { margin:0; font-size: 13px; text-transform: uppercase; letter-spacing:.6px; color: var(--muted);}
  aside.preview pre {
    margin: 0; flex:1; overflow:auto; padding: 14px 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.55;
    white-space: pre; color: #cdd3df;
  }
  .section { display: none; }
  .section.active { display: block; animation: fade .15s ease; }
  @keyframes fade { from { opacity:0; transform: translateY(4px);} to {opacity:1; transform:none;} }
  h1.sec-title { font-size: 20px; margin: 0 0 4px; }
  p.sec-desc { color: var(--muted); margin: 0 0 20px; max-width: 640px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
  }
  .card h4 { margin: 0 0 14px; font-size: 15px; display:flex; align-items:center; gap:8px;}
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
  .field.full { flex-basis: 100%; }
  label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing:.2px; }
  label .hint { font-weight: 400; opacity:.8; }
  input[type=text], input[type=number], textarea, select {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 11px; font-size: 13px; font-family: inherit;
    width: 100%; outline: none; transition: border-color .12s, box-shadow .12s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,140,255,.15); }
  textarea { resize: vertical; min-height: 70px; font-family: var(--mono); font-size: 12.5px; }
  .toggle { display: inline-flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; }
  .toggle input { display: none; }
  .switch { width: 38px; height: 22px; background: var(--panel-2); border:1px solid var(--border); border-radius: 20px; position: relative; transition: background .15s; flex:none;}
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--muted); transition: transform .15s, background .15s;}
  .toggle input:checked + .switch { background: var(--accent-soft); border-color: var(--accent);}
  .toggle input:checked + .switch::after { transform: translateX(16px); background: var(--accent);}
  .toggle .lbl { font-size: 13px; font-weight: 500; }
  button {
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
    border-radius: 8px; padding: 8px 14px; transition: background .12s, border-color .12s, transform .05s;
  }
  button:hover { background: #262b36; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #4f7df0; }
  button.ghost { background: transparent; }
  button.danger { color: var(--red); border-color: #3a2730; }
  button.danger:hover { background: #2a1c22; }
  button.sm { padding: 5px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .group-card { border-left: 3px solid var(--accent); }
  .group-head { display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .group-head .gtitle { font-weight: 700; font-size: 15px; }
  .pill { display:inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; background: var(--panel-2); color: var(--muted); border:1px solid var(--border);}
  .perm-grid { border:1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 6px;}
  .perm-row { display: grid; grid-template-columns: 1.4fr 70px repeat(5, 1fr); gap: 0; align-items:center; border-bottom: 1px solid var(--border);}
  .perm-row:last-child { border-bottom: none; }
  .perm-row.head { background: var(--panel-2); font-size: 11px; color: var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.3px;}
  .perm-row > div { padding: 7px 8px; }
  .perm-row .pname { font-weight: 600; font-size: 13px; }
  .perm-row .pname small { display:block; color: var(--muted); font-weight:400; font-family: var(--mono); font-size: 11px;}
  .perm-row input[type=number] { padding: 5px 7px; font-size: 12px; }
  .perm-row.disabled input[type=number] { opacity: .35; pointer-events: none; }
  .muted-note { color: var(--muted); font-size: 12px; margin-top: 8px;}
  .empty { color: var(--muted); font-style: italic; padding: 16px; text-align:center; border: 1px dashed var(--border); border-radius: 8px;}
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 11px 18px; border-radius: 10px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,.5);
    transition: transform .25s cubic-bezier(.2,.8,.2,1); z-index: 100; display:flex; align-items:center; gap:9px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--green); }
  .toast.err { border-color: var(--red); }
  .file-input { display: none; }
  .json-bad { color: var(--red); }
  details.help { margin-top: 10px; }
  details.help summary { cursor: pointer; color: var(--accent); font-size: 12px; font-weight:600; }
  details.help div { color: var(--muted); font-size: 12.5px; padding: 8px 0 0; }
  code.k { font-family: var(--mono); background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .lang-btn { font-size: 12px; padding: 5px 10px; border-radius: 20px; min-width: 52px; }
  .about-link { color: var(--accent); text-decoration: none; font-weight: 500; transition: color .12s; }
  .about-link:hover { color: #4f7df0; text-decoration: underline; }
  @media (max-width: 1100px) { .layout { grid-template-columns: 200px 1fr; } aside.preview { display:none; } }
</style>
</head>
<body>
<header class="topbar">
  <div class="logo"><span class="dot"></span>Bouncer <span class="ver" id="verLabel"></span></div>
  <div class="spacer"></div>
  <div class="btn-row">
    <button class="ghost lang-btn" id="langBtn"></button>
    <button class="ghost" id="importBtn"></button>
    <button class="ghost" id="pasteBtn"></button>
    <button class="ghost" id="resetBtn"></button>
    <button class="ghost" id="copyBtn"></button>
    <button class="primary" id="downloadBtn"></button>
  </div>
  <input type="file" id="fileInput" class="file-input" accept=".json,.jsonc,.txt">
</header>

<div class="layout">
  <nav class="side" id="nav"></nav>
  <main class="content" id="content"></main>
  <aside class="preview">
    <div class="ph">
      <h3 id="previewTitle"></h3>
      <div class="spacer" style="flex:1"></div>
      <span id="jsonStatus" class="pill"></span>
    </div>
    <pre id="jsonOut"></pre>
  </aside>
</div>

<div class="toast" id="toast"></div>

function clone(o) { return JSON.parse(JSON.stringify(o)); }

function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;

  for (const kid of kids.flat()) { if (kid == null) continue; e.append(kid.nodeType ? kid : document.createTextNode(kid)); }

/* ---------- JSONC parse ---------- */
function stripJsonComments(raw) {
  if (typeof raw !== "string" || !raw) return raw || "";
  let out = "", i = 0, n = raw.length, inStr = false, esc = false;
  while (i < n) {
    const ch = raw[i];
    if (inStr) {
      out += ch;
      if (esc) esc = false;
      else if (ch === "\\") esc = true;
      else if (ch === '"') inStr = false;
      i++; continue;
    }
    if (ch === '"') { inStr = true; out += ch; i++; continue; }
    if (ch === "/" && raw[i + 1] === "/") { i += 2; while (i < n && ch_nl(raw[i]) === false) i++; continue; }
    if (ch === "/" && raw[i + 1] === "*") {
      i += 2;
      while (i < n) {
        if (ch_nl(raw[i])) out += raw[i];
        if (raw[i] === "*" && raw[i + 1] === "/") { i += 2; break; }
        i++;
      }
      continue;
    }
    if (ch === "#") { i++; while (i < n && ch_nl(raw[i]) === false) i++; continue; }
    out += ch; i++;
  }
  return out;
  function ch_nl(c) { return c === "\n" || c === "\r"; }
}
function parseConfig(raw) {
  raw = String(raw).replace(/^﻿/, "");
  try { return JSON.parse(raw); }
  catch (e) { return JSON.parse(stripJsonComments(raw)); }
}

function mergeDefaults(cfg, def) {
  for (const [k, dv] of Object.entries(def)) {
    if (!(k in cfg) || cfg[k] == null) cfg[k] = clone(dv);
    else if (isObj(cfg[k]) && isObj(dv)) mergeDefaults(cfg[k], dv);
  }
  return cfg;
}
function isObj(x) { return x && typeof x === "object" && !Array.isArray(x); }

   ============================================================ */
function renderNav() {
  const nav = $("#nav");
  nav.innerHTML = "";
  SECTIONS.forEach(s => {
    const c = s.count();
    const a = el("a", { class: activeSection === s.id ? "active" : "", onclick: () => { activeSection = s.id; render(); } },
      el("span", {}, t(s.labelKey)),
      c != null ? el("span", { class: "badge" }, String(c)) : el("span", {}));
    nav.append(a);
  });
}
function render() {
  applyStaticLabels();
  renderNav();
  const content = $("#content");
  content.innerHTML = "";
  const section = el("div", { class: "section active" });
  const out = RENDERERS[activeSection]();
  section.append(...(Array.isArray(out) ? out : [out]));
  content.append(section);
  updatePreview();
}

let previewTimer = null;
function queuePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(updatePreview, 120); }
function updatePreview() {
  const json = buildJson();
  $("#jsonOut").textContent = json;
  $("#jsonStatus").textContent = t("valid");
  $("#jsonStatus").style.color = "var(--green)";
}
function buildJson() {
  const ordered = {};
  const order = ["base", "auth", "whitelist", "exemption", "priority", "global_limit",
    "model_groups", "user_groups", "ban_reasons", "fallback", "logging", "ads", "custom_strings"];
  for (const k of order) if (k in config) ordered[k] = config[k];
  for (const k of Object.keys(config)) if (!(k in ordered)) ordered[k] = config[k];
  return JSON.stringify(ordered, null, 2);
}
function refresh() { render(); }

/* ============================================================
   Import / Export / actions
   ============================================================ */
function loadConfig(raw) {
  let parsed;
  try { parsed = parseConfig(raw); }
  catch (e) { toast(t("invalidJson") + e.message, "err"); return false; }
  if (!isObj(parsed)) { toast(t("configRootError"), "err"); return false; }
  config = mergeDefaults(parsed, DEFAULT_CONFIG);
  config.model_groups = (config.model_groups || []).map(g => ({
    id: slug(g.id || g.name || "group"),
    name: g.name || g.id || "Group",
    models: Array.isArray(g.models) ? g.models : [],
    ads: isObj(g.ads) ? {
      enabled: !!g.ads.enabled,
      content: Array.isArray(g.ads.content) ? g.ads.content : []
    } : { enabled: false, content: [] }
  }));
  config.user_groups = (config.user_groups || []).map(g => ({
    ...g,
    id: slug(g.id || g.name || "group"),
    emails: Array.isArray(g.emails) ? g.emails : [],
    default_permissions: g.default_permissions || clone(DEFAULT_CONFIG.user_groups[0].default_permissions),
    permissions: isObj(g.permissions) ? g.permissions : {}
  }));
  cleanupPermissions();
  render();
  toast(t("configLoaded"), "ok");
  return true;
}

/* ---------- wire up static buttons ---------- */
$("#langBtn").addEventListener("click", () => {
  lang = lang === "en" ? "zh" : "en";
  localStorage.setItem("bouncer_lang", lang);
  render();
});

$("#fileInput").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => loadConfig(r.result);
  r.readAsText(f);
  e.target.value = "";
});

$("#importBtn").addEventListener("click", () => document.getElementById("fileInput").click());

$("#pasteBtn").addEventListener("click", async () => {
  try {
    const txt = await navigator.clipboard.readText();
    if (!txt) { toast(t("clipboardEmpty"), "err"); return; }
    loadConfig(txt);
  } catch (e) {
    const txt = prompt(t("pastePrompt"));
    if (txt) loadConfig(txt);
  }
});

$("#copyBtn").addEventListener("click", async () => {
  const json = buildJson();
  try { await navigator.clipboard.writeText(json); toast(t("copied"), "ok"); }
  catch (e) {
    const ta = el("textarea", {}); ta.value = json; document.body.append(ta); ta.select();
    document.execCommand("copy"); ta.remove(); toast(t("copied"), "ok");
  }
});

$("#downloadBtn").addEventListener("click", () => {
  const blob = new Blob([buildJson()], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = el("a", { href: url, download: "bouncer_config.json" });
  document.body.append(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast(t("exported"), "ok");
});

$("#resetBtn").addEventListener("click", () => {
  if (confirm(t("resetConfirm"))) {
    config = clone(DEFAULT_CONFIG); activeSection = "general"; render(); toast(t("resetDone"), "ok");
  }
});

/* boot */
render();
</script>
</body>
</html>
